name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome
        run: bunx biome ci .
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build
